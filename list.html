---
layout: page
title: All Posts
---

<div class="posts">
  {% for post in site.posts %}
  <div class="post">
    <h3 class="post-title">
      <a href="{{ post.url }}">
        {{ post.title }}
      </a>
    </h3>

    <span class="post-date" style="margin-bottom:-3rem;">{{ post.date | date_to_string }}</span>
  </div>
  {% endfor %}
</div>
